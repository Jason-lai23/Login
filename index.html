<!DOCTYPE html>
<html>
<head>
    <title>My Practice App Login</title>
</head>
<body>
    <h2>Enterprise Portal Login</h2>
    <!-- This is the form you will target in Phase 1 & 2 -->
    <form name="practiceLoginForm" id="login-secure-auth" action="dashboard.html?" method="GET">
        <div>
            <label>Username:</label>
            <input type="text" name="user_payload_id" id="username-field" placeholder="Enter User">
        </div>
        <br>
        <div>
            <label>Password:</label>
            <input type="password" name="pass_payload_id" id="password-field" placeholder="Enter Pass">
        </div>
        <br>
        <button type="submit" id="submit-btn">Sign In</button>
    </form>
</body>
</html>
