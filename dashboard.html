<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Application Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .badge {
            background-color: #2ecc71;
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        p {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user-box {
            background-color: #e8f8f5;
            border: 1px solid #a3e4d7;
            padding: 12px;
            border-radius: 6px;
            margin-top: 25px;
            color: #16a085;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="badge">SSO SUCCESS</div>
        <h1>Form Fill Working!</h1>
        <p>If you are reading this page, your OpenText Access Manager Gateway successfully read your policy, injected your LDAP/Secret Store credentials, and logged you in automatically.</p>
        
        <!-- The JS below will fill this in dynamically -->
        <div class="user-box">
            Logged in as: <span id="sso-username">Extracting...</span>
        </div>
    </div>

    <script>
        // Grab the parameters out of the URL bar (sent via form GET method)
        const urlParams = new URLSearchParams(window.location.search);
        
        // Match the username field name used in your Form Fill Policy
        const usernameValue = urlParams.get('user_payload_id');

        if (usernameValue) {
            document.getElementById('sso-username').textContent = usernameValue;
        } else {
            document.getElementById('sso-username').textContent = "Successfully Redirected (But no username parameter found)";
        }
    </script>

</body>
</html>
